services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev

    env_file:
      - .env

    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379

    command: sh -c "npm install && npm run dev"

    ports:
      - "3000:3000"

    volumes:
      - .:/app

    depends_on:
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev

    env_file:
      - .env

    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379

    command: sh -c "npm install && npm run worker:dev"

    volumes:
      - .:/app

    depends_on:
      - redis

  redis:
    image: redis:7-alpine

    ports:
      - "6379:6379"